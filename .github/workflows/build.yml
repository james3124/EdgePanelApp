name: Build EdgePanel APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Grant execute permission to gradlew
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # 5. Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Upload Debug APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EdgePanel-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 8. Build Release APK (unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 9. Upload Release APK as artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: EdgePanel-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # 10. Show APK info
      - name: Show build output
        run: |
          echo "=== Debug APK ==="
          ls -lh app/build/outputs/apk/debug/ || echo "No debug APK found"
          echo "=== Release APK ==="
          ls -lh app/build/outputs/apk/release/ || echo "No release APK found"
          
